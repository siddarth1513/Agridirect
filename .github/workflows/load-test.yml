name: Load Performance Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  schedule:
    - cron: '0 2 * * *'   # everyday at 02:00 UTC
  workflow_dispatch:

jobs:
  load-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install k6
        run: |
          sudo apt-get update
          sudo apt-get install -y gnupg2 curl && \
          curl -s https://dl.k6.io/key.gpg | sudo apt-key add - && \
          echo "deb https://dl.k6.io/deb stable main" | sudo tee -a /etc/apt/sources.list.d/k6.list && \
          sudo apt-get update && sudo apt-get install -y k6

      - name: Generate Load test scripts (300)
        run: |
          python automation/scripts/generate_all_tests.py load

      - name: Run Load tests
        run: |
          for script in automation/load/scripts/*.js; do \
            echo "Running $script"; \
            k6 run --vus 100 --duration 1m "$script"; \
          done

      - name: Archive Load test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: load-reports
          path: automation/load/reports/**

      - name: Summarize results
        if: always()
        run: |
          echo "# Load Test Summary" >> $GITHUB_STEP_SUMMARY
          echo "Executed: 300" >> $GITHUB_STEP_SUMMARY
          # Placeholder for pass count – k6 exit code indicates success/failure
          echo "Passed: $(grep -c ' ✓ ' automation/load/reports/*.txt || echo 0)" >> $GITHUB_STEP_SUMMARY
