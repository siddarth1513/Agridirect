name: API Unit & Validation Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  api-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pytest

      - name: Generate API tests (300)
        run: |
          python automation/scripts/generate_all_tests.py api

      - name: Run API tests
        run: |
          pytest automation/api/tests --junitxml=reports/api_results.xml

      - name: Archive API reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-reports
          path: reports/api_results.xml

      - name: Summarize results
        if: always()
        run: |
          echo "# API Test Summary" >> $GITHUB_STEP_SUMMARY
          echo "Executed: 300" >> $GITHUB_STEP_SUMMARY
          echo "Passed: $(pytest automation/api/tests -q | grep -c 'PASSED' || echo 0)" >> $GITHUB_STEP_SUMMARY
